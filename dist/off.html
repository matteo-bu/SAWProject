<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Offline</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>You Are Offline</h1>
    <button id="retryBtn">Try To Reconnect</button>

    <script>
        
        async function checkOnline() {
            
            if (!navigator.onLine) return false;

            try {
                //parametro casuale, solo intestazione, no cache
                const response = await fetch('/?t=' + Date.now(), { method: 'HEAD', cache: 'no-store' });
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        document.getElementById('retryBtn').addEventListener('click', async () => {
            const online = await checkOnline();
            
            if (online) {
                window.location.href = '/';
            } else {
                alert('You Are Still Offline');
            }
        });
        
    </script>
</body>
</html>
