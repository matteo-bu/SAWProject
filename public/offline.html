<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Offline</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Dispositivo Offline</h1>
    <p>La pagina richiesta non è disponibile senza una connessione internet.</p>
    <button id="retryBtn">Riprova a connetterti</button>

    <script>
        // 1. Se l'utente preme F5 o clicca il bottone da ONLINE, lo rimanda alla home
        document.getElementById('retryBtn').addEventListener('click', () => {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                alert('Sei ancora offline. Controlla la tua connessione.');
            }
        });

        // 2. Rilevamento automatico del ritorno online senza dover fare nulla
        window.addEventListener('online', () => {
            window.location.href = '/';
        });

        // 3. Controllo preventivo: se per qualche motivo ricarica ed è online, esce subito
        if (navigator.onLine) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
